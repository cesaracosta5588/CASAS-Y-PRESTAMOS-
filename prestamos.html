<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Préstamos Rápidos</title>
<style>
body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
padding:0;
text-align:center;
}
header{
background:#1e88e5;
color:white;
padding:20px;
}
.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}
button{
background:#1e88e5;
color:white;
border:none;
cursor:pointer;
}
button:hover{
background:#1565c0;
}
#resultado{
font-weight:bold;
margin-top:10px;
}
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-size:18px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<header>
<h1>Préstamos Rápidos</h1>
<p>Solicita tu préstamo en minutos</p>
</header>

<div class="container">

<h2>Solicitud de préstamo</h2>

<form action="mailto:cesaracostamacias397@gmail.com" method="post" enctype="text/plain">

<input type="text" name="Nombre" placeholder="Tu nombre" required>

<input type="tel" name="Telefono" placeholder="Tu teléfono" required>

<input type="number" name="Monto" placeholder="Monto que necesitas" required>

<input type="number" name="Meses" placeholder="Meses para pagar" required>

<button type="submit" onclick="mensaje()">Enviar solicitud</button>

</form>

<hr>

<h3>Calculadora de préstamo</h3>

<input type="number" id="montoCalc" placeholder="Monto del préstamo">

<input type="number" id="mesesCalc" placeholder="Meses">

<button onclick="calcular()">Calcular pago</button>

<p id="resultado"></p>

</div>

<a href="https://wa.me/528120075953" class="whatsapp">WhatsApp</a>

<script>
function calcular(){

var monto=document.getElementById("montoCalc").value;
var meses=document.getElementById("mesesCalc").value;

var interes=0.20;

var total=(monto*(1+interes))/meses;

document.getElementById("resultado").innerHTML=
"Pago mensual aproximado: $"+Number(total).toFixed(2);

}

function mensaje(){
alert("Solicitud enviada ✔️ En breve nos comunicaremos contigo.");
}
</script>

</body>
</html>
